<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="theme-color" content="#17527c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- SEO básico -->
    <meta name="description" content="Equilibre — Plataforma de terapia digital para psicólogos y pacientes." />
    <link rel="canonical" href="https://equilibreapp.vercel.app/" />

    <!-- Open Graph (WhatsApp, Facebook, Telegram, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://equilibreapp.vercel.app/" />
    <meta property="og:title"       content="Equilibre - Terapia Digital" />
    <meta property="og:description" content="Plataforma de terapia digital para psicólogos y pacientes." />
    <meta property="og:image"       content="https://equilibreapp.vercel.app/icon-192.png" />
    <meta property="og:image:width"  content="192" />
    <meta property="og:image:height" content="192" />
    <meta property="og:locale"      content="es_ES" />
    <meta property="og:site_name"   content="Equilibre" />

    <!-- Twitter Card (también usado por algunos clientes de mensajería) -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:url"         content="https://equilibreapp.vercel.app/" />
    <meta name="twitter:title"       content="Equilibre - Terapia Digital" />
    <meta name="twitter:description" content="Plataforma de terapia digital para psicólogos y pacientes." />
    <meta name="twitter:image"       content="https://equilibreapp.vercel.app/icon-192.png" />
    
    <title>Equilibre - Terapia Digital</title>
    <link rel="icon" type="image/png" href="/equilibre-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('Service Worker registrado:', registration.scope))
            .catch(error => console.error('Error al registrar Service Worker:', error));
        });
      }
    </script>
  </body>
</html>
