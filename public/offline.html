<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equilibre — Sem conexão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f8f0;
      font-family: system-ui, sans-serif;
      color: #3a4a36;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(60, 100, 55, .12);
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: sway 4s ease-in-out infinite;
      transform-origin: bottom center;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: .6rem;
      letter-spacing: -.02em;
    }

    p {
      font-size: .9rem;
      color: #6b7f66;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    button {
      background: #7bb369;
      color: white;
      border: none;
      border-radius: 50px;
      padding: .7rem 1.6rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 180ms, transform 140ms;
      box-shadow: 0 4px 14px rgba(91, 154, 80, .28);
    }

    button:hover {
      background: #5a9a50;
      transform: translateY(-2px);
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg);  }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon" aria-hidden="true">🌿</span>
    <h1>Sem conexão</h1>
    <p>
      Parece que você está offline. Não se preocupe —
      suas alterações serão salvas assim que a conexão voltar.
    </p>
    <button onclick="window.location.reload()">
      Tentar novamente
    </button>
  </div>
</body>
</html>
