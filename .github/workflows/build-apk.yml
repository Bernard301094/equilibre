name: Build TWA APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      # SOLUCIÓN DEFINITIVA: Crea el archivo de configuración directamente sin usar comandos interactivos
      - name: Configure Bubblewrap Paths
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Prepare TWA Project Configuration
        run: |
          mkdir -p twa-project
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa-project/keystore.jks
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "com.equilibre.app",
            "host": "${{ secrets.APP_HOST }}",
            "name": "Equilibre - Terapia Digital",
            "launcherName": "Equilibre",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#17527c",
            "backgroundColor": "#f4f8fc",
            "startUrl": "/",
            "iconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "maskableIconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "equilibre"
            },
            "minSdkVersion": 23,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build APK
        working-directory: ./twa-project
        run: |
          bubblewrap update
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUBBLEWRAP_DISABLE_TELEMETRY: 1

      - name: Find and move APK
        run: |
          find ./twa-project -name '*.apk' | head -5
          cp $(find ./twa-project -name 'app-release-signed.apk' | head -1) equilibre-v1.0.0.apk || \
          cp $(find ./twa-project -name '*.apk' | head -1) equilibre-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: equilibre-apk
          path: equilibre-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: equilibre-v1.0.0.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}