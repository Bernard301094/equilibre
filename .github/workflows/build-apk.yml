name: Build TWA APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Configure Bubblewrap Paths
        run: |
          mkdir -p ~/.bubblewrap
          node -e "const fs = require('fs'); fs.writeFileSync(require('os').homedir() + '/.bubblewrap/config.json', JSON.stringify({ jdkPath: process.env.JAVA_HOME, androidSdkPath: process.env.ANDROID_SDK_ROOT }))"

      - name: Prepare TWA Project Configuration
        run: |
          mkdir -p twa-project
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r' | base64 -d > twa-project/keystore.jks
          CLEAN_HOST=$(echo "${{ secrets.APP_HOST }}" | tr -d ' \n\r')
          
          # Hacemos que Bubblewrap busque las imágenes en el servidor local (localhost)
          cat > twa-project/twa-manifest.json << EOF
          {
            "packageId": "com.equilibre.app",
            "host": "$CLEAN_HOST",
            "name": "Equilibre - Terapia Digital",
            "launcherName": "Equilibre",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#17527c",
            "backgroundColor": "#f4f8fc",
            "startUrl": "/",
            "iconUrl": "http://localhost:8080/icon-512.png",
            "maskableIconUrl": "http://localhost:8080/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "equilibre"
            },
            "minSdkVersion": 23,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build APK
        working-directory: ./twa-project
        run: |
          # Levantamos el servidor interno de Python para servir el ícono en secreto
          python3 -m http.server 8080 --directory ../public &
          sleep 3
          
          bubblewrap update
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUBBLEWRAP_DISABLE_TELEMETRY: 1

      - name: Find and move APK
        run: |
          cp $(find ./twa-project -name 'app-release-signed.apk' | head -1) equilibre-v1.0.0.apk || \
          cp $(find ./twa-project -name '*.apk' | head -1) equilibre-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: equilibre-apk
          path: equilibre-v1.0.0.apk
          retention-days: 30