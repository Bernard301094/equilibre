name: Build TWA APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.equilibre.app",
            "host": "${{ secrets.APP_HOST }}",
            "name": "Equilibre - Terapia Digital",
            "launcherName": "Equilibre",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#17527c",
            "backgroundColor": "#f4f8fc",
            "startUrl": "/",
            "iconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "maskableIconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "equilibre"
            },
            "minSdkVersion": 23,
            "targetSdkVersion": 34
          }
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build APK with Bubblewrap
        run: |
          bubblewrap build \
            --manifest twa-manifest.json \
            --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: equilibre-apk
          path: '*.apk'
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
