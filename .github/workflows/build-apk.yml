name: Build TWA APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI (non-interactive)
        run: npm install -g @bubblewrap/cli@latest

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << EOF
          {
            "packageId": "com.equilibre.app",
            "host": "${{ secrets.APP_HOST }}",
            "name": "Equilibre - Terapia Digital",
            "launcherName": "Equilibre",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#17527c",
            "backgroundColor": "#f4f8fc",
            "startUrl": "/",
            "iconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "maskableIconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "equilibre"
            },
            "minSdkVersion": 23,
            "targetSdkVersion": 34
          }
          EOF

      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init \
            --manifest https://${{ secrets.APP_HOST }}/manifest.json \
            --directory ./twa-project \
            --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: 1

      - name: Copy keystore into project
        run: cp keystore.jks ./twa-project/keystore.jks

      - name: Update signing config
        run: |
          cd twa-project
          cat > twa-manifest.json << EOF
          {
            "packageId": "com.equilibre.app",
            "host": "${{ secrets.APP_HOST }}",
            "name": "Equilibre - Terapia Digital",
            "launcherName": "Equilibre",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#17527c",
            "backgroundColor": "#f4f8fc",
            "startUrl": "/",
            "iconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "maskableIconUrl": "https://${{ secrets.APP_HOST }}/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "equilibre"
            },
            "minSdkVersion": 23,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUBBLEWRAP_DISABLE_TELEMETRY: 1
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find and move APK
        run: |
          find . -name '*.apk' | head -5
          cp $(find . -name 'app-release-signed.apk' | head -1) equilibre-v1.0.0.apk || \
          cp $(find . -name '*.apk' | head -1) equilibre-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: equilibre-apk
          path: equilibre-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: equilibre-v1.0.0.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
